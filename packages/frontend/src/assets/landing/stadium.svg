<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 260" role="img" aria-labelledby="title desc">
  <title>Stadium lights and field</title>
  <desc>Stylized football stadium lights over a green field.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2f4b" />
      <stop offset="100%" stop-color="#2f5f86" />
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f7b4c" />
      <stop offset="100%" stop-color="#1f5c39" />
    </linearGradient>
  </defs>
  <rect width="420" height="170" fill="url(#sky)" />
  <rect y="170" width="420" height="90" fill="url(#field)" />
  <g fill="#f8f6e3" opacity="0.95">
    <rect x="44" y="28" width="14" height="84" rx="3" />
    <rect x="71" y="28" width="14" height="84" rx="3" />
    <rect x="98" y="28" width="14" height="84" rx="3" />
    <rect x="307" y="28" width="14" height="84" rx="3" />
    <rect x="334" y="28" width="14" height="84" rx="3" />
    <rect x="361" y="28" width="14" height="84" rx="3" />
  </g>
  <g stroke="#d7ecdb" stroke-width="3" opacity="0.7">
    <line x1="210" y1="170" x2="210" y2="258" />
    <line x1="140" y1="188" x2="280" y2="188" />
    <line x1="110" y1="218" x2="310" y2="218" />
  </g>
</svg>
